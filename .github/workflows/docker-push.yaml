name: Docker push

on: 
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  docker_push:
    runs-on: [self-hosted, wsl1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
  
      - name: Login to Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -f Dockerfile.distroless -t dockerfile-distroless .

      - name: Set Docker tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
        
      - name: Tag Docker Image
        run:  docker tag dockerfile-distroless ${{ vars.DOCKERHUB_USERNAME }}/nodeapp3:$SHORT_SHA

      - name: Push Docker image
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/nodeapp3:$SHORT_SHA
