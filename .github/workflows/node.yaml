name: Basic Node pipeline

on:
  push:
    branches: ["main"]

jobs:
  node-build:
    runs-on: [self-hosted, wsl1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run application
        run: node server.js
